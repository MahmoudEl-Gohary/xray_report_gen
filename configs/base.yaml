project:
  name: "multianatomy-xray-report-generation"
  experiment_name: "baseline-qwen"
  seed: 3407

paths:
  data_root: "/data/xray"
  results_dir: "./results"
  mlflow_tracking_uri: "file:./mlruns"
  eval_resources_dir: "./.eval_cache"

model_id: "unsloth/Qwen2.5-VL-3B-Instruct"

lora:
  r: 16
  lora_alpha: 16
  lora_dropout: 0.0
  finetune_vision: false
  finetune_language: true

training:
  batch_size: 2
  grad_accum: 4
  learning_rate: 2.0e-4
  max_steps: 60
  warmup_steps: 5
  logging_steps: 5
  load_in_4bit: true
project:
  name: "multianatomy-xray-report-generation"
  experiment_name: "baseline-qwen"
  seed: 3407

paths:
  results_dir: "./results"
  mlflow_tracking_uri: "https://dagshub.com/MahmoudEl-Gohary/xray_report_gen.mlflow"
  eval_resources_dir: "./.eval_cache"

# Each dataset has its own manifest files and image directory.
# Image paths inside manifests must be basenames (e.g., "abc123.png").
datasets:
  spine:
    train_manifest: "data/spine/train_manifest.json"
    test_manifest: "data/spine/test_manifest.json"
    image_dir: "data/spine/images"
  knee:
    train_manifest: "data/knee/train_manifest.json"
    test_manifest: "data/knee/test_manifest.json"
    image_dir: "data/knee/images"
  # Uncomment when the private dataset is ready:
  # private:
  #   train_manifest: "data/private/train_manifest.json"
  #   test_manifest: "data/private/test_manifest.json"
  #   image_dir: "data/private/images"

model_id: "unsloth/Qwen2.5-VL-2B-Instruct"

lora:
  r: 16
  lora_alpha: 16
  lora_dropout: 0.0
  finetune_vision: false
  finetune_language: true

training:
  batch_size: 2
  grad_accum: 4
  learning_rate: 2.0e-4
  num_train_epochs: 1
  max_steps: -1
  warmup_steps: 5
  logging_steps: 5
  save_steps: 50
  save_strategy: "steps"
  load_in_4bit: true
  max_seq_length: 2048
  report_to: "mlflow"

inference:
  max_new_tokens: 512
  temperature: 0.1